spring.application.name=Broken_Ranks_Tool

# Serwer
server.port=8080

# Baza danych zapisywana do folderu 'db' w Twoim projekcie
spring.datasource.url=jdbc:h2:file:./db/br_database;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate - automatyczne tworzenie tabel
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Konsola H2 - dost?pna pod http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true