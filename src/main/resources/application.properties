spring.application.name=Broken_Ranks_Tool

# Serwer
server.port=8080

# Baza danych zapisywana do folderu 'db'
spring.datasource.url=jdbc:h2:file:./db/br_database;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=p
spring.sql.init.mode=always

# Hibernate - automatyczne tworzenie tabel
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Konsola H2 - dost?pna pod http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true