<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Broken Ranks Gear Builder</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #1e1e1e; color: #e0e0e0; }
        h1 { text-align: center; color: #d35400; }

        .container { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; }

        /* Lewa kolumna - Ekwipunek */
        .gear-panel { flex: 2; background: #2d2d2d; padding: 20px; border-radius: 8px; }

        /* Prawa kolumna - Statystyki */
        .stats-panel { flex: 1; background: #2d2d2d; padding: 20px; border-radius: 8px; position: sticky; top: 20px; height: fit-content; border: 1px solid #444; }

        .slot-row { background: #383838; padding: 15px; margin-bottom: 15px; border-radius: 6px; border-left: 5px solid #d35400; }
        .slot-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .slot-title { font-weight: bold; font-size: 1.1em; color: #fff; }

        /* Style Selectów */
        select { width: 100%; padding: 10px; margin-bottom: 8px; background: #444; color: white; border: 1px solid #555; border-radius: 4px; font-size: 14px; }
        select:focus { outline: none; border-color: #d35400; }

        /* Przyciski */
        .btn-add-drif { background: #27ae60; padding: 5px 10px; border-radius: 4px; border: none; color: white; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .btn-add-drif:hover { background: #2ecc71; }

        .btn-remove-drif { background: #c0392b; color: white; border: none; cursor: pointer; margin-left: 5px; width: 30px; border-radius: 4px; }
        .btn-remove-drif:hover { background: #e74c3c; }

        button.calc-btn { width: 100%; padding: 15px; background: #d35400; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 18px; margin-top: 20px; border-radius: 5px; transition: 0.2s; }
        button.calc-btn:hover { background: #e67e22; }

        /* Kontener na dynamiczne Drify */
        .drif-container { margin-top: 10px; padding-left: 10px; border-left: 2px dashed #555; }
        .drif-row { display: flex; margin-bottom: 5px; }

        /* Wyniki */
        .stat-row { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 8px 0; }
        .stat-val { color: #f1c40f; font-weight: bold; }
        .total-info { text-align: center; color: #888; font-size: 0.9em; margin-top: 10px; }
    </style>
</head>
<body>

<h1>🛠️ Broken Ranks Builder</h1>

<div class="container">
    <div class="gear-panel" id="gearPanel">
        <div style="text-align: center; color: #888;">Ładowanie przedmiotów...</div>
    </div>

    <div class="stats-panel">
        <h3 style="margin-top: 0; border-bottom: 2px solid #d35400; padding-bottom: 10px;">📊 Twoje Statystyki</h3>
        <div id="results">
            <p style="text-align: center; color: #aaa;">Wybierz przedmioty i kliknij PRZELICZ</p>
        </div>
        <button class="calc-btn" onclick="calculate()">PRZELICZ STATYSTYKI</button>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8080/api';

    // Konfiguracja slotów (klucz w JS : wyświetlana nazwa : kategoria Enum)
    const SLOTS = [
        { key: 'helmet', label: 'Hełm', cat: 'HELMET' },
        { key: 'armor', label: 'Zbroja', cat: 'ARMOR' },
        { key: 'cape', label: 'Peleryna', cat: 'CAPE' },
        { key: 'legs', label: 'Spodnie', cat: 'LEGS' },
        { key: 'boots', label: 'Buty', cat: 'BOOTS' },
        { key: 'gloves', label: 'Rękawice', cat: 'GLOVES' },
        { key: 'belt', label: 'Pas', cat: 'BELT' },
        { key: 'ring1', label: 'Pierścień 1', cat: 'RING' },
        { key: 'ring2', label: 'Pierścień 2', cat: 'RING' },
        { key: 'necklace', label: 'Naszyjnik', cat: 'NECKLACE' },
        { key: 'shield', label: 'Tarcza', cat: 'SHIELD' },
        { key: 'weapon', label: 'Broń', cat: 'WEAPON' } // Specjalna obsługa w kodzie
    ];

    let allItems = [];
    let allDrifs = [];
    let allOrbs = [];

    // --- 1. INICJALIZACJA ---
    async function init() {
        try {
            // Pobieramy dane równolegle
            const [itemsResp, drifsResp] = await Promise.all([
                fetch(`${API_URL}/items`),
                fetch(`${API_URL}/drifs`)
            ]);

            allItems = await itemsResp.json();
            allDrifs = await drifsResp.json();

            // Orby - opcjonalnie, jeśli endpoint nie istnieje, to pusta lista
            try {
                const orbsResp = await fetch(`${API_URL}/orbs`);
                if(orbsResp.ok) allOrbs = await orbsResp.json();
            } catch(e) { console.warn("Brak endpointu orbs, pomijam."); }

            renderPanel();
        } catch (error) {
            console.error(error);
            document.getElementById('gearPanel').innerHTML = `<h3 style="color:red">Błąd ładowania danych z serwera! Upewnij się, że backend działa.</h3>`;
        }
    }

    // --- 2. RENDEROWANIE SLOTÓW ---
    function renderPanel() {
        const container = document.getElementById('gearPanel');
        container.innerHTML = '';

        SLOTS.forEach(slot => {
            // Filtrujemy przedmioty dla danego slotu
            const itemsForSlot = allItems.filter(i => {
                if (slot.key === 'weapon') return i.category.includes('WEAPON'); // Obsługa 1H, 2H, Ranged
                return i.category === slot.cat;
            });

            // HTML dla pojedynczego slotu
            const html = `
                <div class="slot-row" id="row-${slot.key}">
                    <div class="slot-header">
                        <span class="slot-title">${slot.label}</span>
                        <button class="btn-add-drif" onclick="addDrifSelect('${slot.key}')">+ Dodaj Drif</button>
                    </div>

                    <select id="${slot.key}Id">
                        <option value="">-- Wybierz ${slot.label} --</option>
                        ${itemsForSlot.map(i => `<option value="${i.id}">${i.name} (Lvl ${i.reqLevel})</option>`).join('')}
                    </select>

                    <select id="${slot.key}OrbId">
                        <option value="">-- Brak Orba --</option>
                        ${allOrbs.map(o => `<option value="${o.id}">${o.name} (${o.bonusType})</option>`).join('')}
                    </select>

                    <div class="drif-container" id="${slot.key}-drifs"></div>
                </div>
            `;
            container.innerHTML += html;
        });
    }

    // --- 3. DODAWANIE DRIFA (Dynamiczne) ---
    window.addDrifSelect = function(slotKey) {
        const container = document.getElementById(`${slotKey}-drifs`);

        const div = document.createElement('div');
        div.className = 'drif-row';

        let options = `<option value="">-- Wybierz Drif --</option>`;
        // Sortujemy drify alfabetycznie dla wygody
        const sortedDrifs = [...allDrifs].sort((a,b) => a.name.localeCompare(b.name));

        sortedDrifs.forEach(d => {
            options += `<option value="${d.id}">${d.name} (${d.baseValue})</option>`;
        });

        div.innerHTML = `
            <select class="drif-select" style="margin-bottom:0;">${options}</select>
            <button class="btn-remove-drif" onclick="this.parentElement.remove()">X</button>
        `;

        container.appendChild(div);
    }

    // --- 4. OBLICZANIE (Wysyłka do backendu) ---
    async function calculate() {
        const request = {};
        const resultContainer = document.getElementById('results');
        resultContainer.innerHTML = '<div style="text-align:center">Liczenie...</div>';

        SLOTS.forEach(slot => {
            // ID Przedmiotu
            const itemId = document.getElementById(`${slot.key}Id`).value;
            request[`${slot.key}Id`] = itemId ? parseInt(itemId) : null;

            // ID Orba
            const orbId = document.getElementById(`${slot.key}OrbId`).value;
            request[`${slot.key}OrbId`] = orbId ? parseInt(orbId) : null;

            // Lista Drifów
            const drifSelects = document.querySelectorAll(`#${slot.key}-drifs .drif-select`);
            const drifIds = [];
            drifSelects.forEach(sel => {
                if(sel.value) drifIds.push(parseInt(sel.value));
            });
            request[`${slot.key}Drifs`] = drifIds;
        });

        console.log("Wysyłam JSON:", request);

        try {
            const response = await fetch(`${API_URL}/calculator/calculate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(request)
            });

            const stats = await response.json();
            displayResults(stats);
        } catch (e) {
            console.error(e);
            resultContainer.innerHTML = `<span style="color:red">Błąd połączenia z serwerem!</span>`;
        }
    }

    function displayResults(stats) {
        const container = document.getElementById('results');
        container.innerHTML = '';

        if (Object.keys(stats).length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#aaa;">Brak statystyk do wyświetlenia.</p>';
            return;
        }

        // Sortujemy klucze (żeby Siła, Moc itp. były ładnie ułożone, a nie losowo)
        const sortedKeys = Object.keys(stats).sort();

        for (const key of sortedKeys) {
            container.innerHTML += `
                <div class="stat-row">
                    <span>${key}</span>
                    <span class="stat-val">${stats[key]}</span>
                </div>
            `;
        }

        container.innerHTML += '<div class="total-info">Statystyki uwzględniają przedmioty, orby i drify.</div>';
    }

    // Start!
    init();
</script>

</body>
</html>
